context:
  name: r-fclust
  version: "2.1.3"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://cran.r-project.org/src/contrib/fclust_${{ version  }}.tar.gz
  sha256: d19bd58ff140015b9cfcb76b4d4c582a21ed955480ffd46a392f8286be55166e

build:
  number: 0
  skip:
    - win
  script:
    - R CMD INSTALL --build .

requirements:
  host:
    - r-base >=4.5.0
    - r-rcpp
    - r-rcpparmadillo
    - r-mass >=7.3-65
  run:
    - r-base >=4.5.0
    - r-rcpp
    - r-rcpparmadillo
    - r-mass >=7.3-65

tests:
  - script:
    - Rscript -e "library('fclust')"
  - script:
    - Rscript -e "library('fclust'); packageVersion('fclust')"

about:
  homepage: https://cran.r-project.org/package=fclust
  summary: Fuzzy Clustering 
  description: |
    Algorithms for fuzzy clustering, cluster validity indices and plots for cluster validity and visualizing fuzzy clustering results.
  license: GPL-2.0-or-later
