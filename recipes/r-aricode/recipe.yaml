context:
  name: r-aricode
  version: "1.10.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://cran.r-project.org/src/contrib/aricode_${{ version  }}.tar.gz
  sha256: 10a739353feb4f552496d3a51d436088c92edbd241f80f7c33ee5f278de1d90a

build:
  number: 0
  skip:
    - win
  script:
    - R CMD INSTALL --build .

requirements:
  host:
    - r-base >=4.5.0
  run:
    - r-base >=4.5.0

tests:
  - script:
    - Rscript -e "library('aricode')"
  - script:
    - Rscript -e "library('aricode'); packageVersion('aricode')"

about:
  homepage: https://cran.r-project.org/package=aricode
  summary: Efficient Computations of Standard Clustering Comparison Measures
  description: |
    Implements an efficient O(n) algorithm based on bucket-sorting for fast computation 
    of standard clustering comparison measures. Available measures include adjusted Rand 
    index (ARI), normalized information distance (NID), normalized mutual information (NMI), 
    adjusted mutual information (AMI), normalized variation information (NVI) and entropy, 
    as described in Vinh et al (2009) <doi:10.1145/1553374.1553511>. Include AMI (Adjusted 
    Mutual Information) since version 0.1.2, a modified version of ARI (MARI), as described 
    in Sundqvist et al. <doi:10.1007/s00180-022-01230-7> and simple Chi-square distance 
    since version 1.0.0.
  license: GPL-3.0-only
  repository: https://github.com/jchiquet/aricode
  documentation: https://cran.r-project.org/web/packages/aricode/refman/aricode.html

extra:
  recipe-maintainers:
    - markrobinsonuzh
  #bioconductor:
  #  package: 
  #  version: 3.22
